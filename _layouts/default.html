<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --clay:        #C4572A;
      --clay-dark:   #8B3A1C;
      --clay-light:  #F0E8DF;
      --navy:        #1B2A3B;
      --navy-mid:    #243648;
      --gold:        #C8A243;
      --cream:       #FAFAF8;
      --sand:        #F5EDE3;
      --text:        #1C1C1C;
      --text-muted:  #6B6056;
      --border:      #DDD4C8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.7;
      font-weight: 400;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 8px,
          rgba(255,255,255,0.022) 8px,
          rgba(255,255,255,0.022) 9px
        );
      pointer-events: none;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--clay-dark), var(--clay), var(--gold), var(--clay), var(--clay-dark));
    }

    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 2.5rem;
    }

    .site-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: white;
    }

    .site-title-icon {
      width: 36px;
      height: 36px;
      background: var(--clay);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .site-title-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .site-title-main {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: white;
    }

    .site-title-sub {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      background: var(--sand);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 2.5rem;
    }

    .breadcrumb a {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .breadcrumb a:hover { color: var(--clay); }

    .breadcrumb span {
      font-size: 0.8rem;
      color: var(--border);
      margin: 0 0.5rem;
    }

    /* ── MAIN CONTENT ── */
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 2.5rem 4rem;
    }

    /* ── TYPOGRAPHY ── */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.25;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    h1::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: var(--clay);
      margin-top: 0.7rem;
      border-radius: 2px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--navy);
      margin: 2.5rem 0 0.8rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.01em;
    }

    h3 {
      font-size: 1.0rem;
      font-weight: 600;
      color: var(--clay-dark);
      margin: 1.6rem 0 0.4rem;
      letter-spacing: 0.01em;
    }

    p { margin-bottom: 0.85rem; font-size: 0.97rem; }

    ul, ol {
      margin: 0.4rem 0 0.85rem 1.4rem;
    }

    li {
      margin-bottom: 0.35rem;
      font-size: 0.97rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    strong { font-weight: 600; color: var(--text); }

    em { font-style: italic; color: var(--text-muted); font-size: 0.9em; }

    a { color: var(--clay-dark); text-decoration: none; border-bottom: 1px solid var(--border); transition: color 0.2s, border-color 0.2s; }
    a:hover { color: var(--clay); border-color: var(--clay); }

    /* ── CATEGORY GRID (forside) ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.1rem;
      margin-top: 2rem;
    }

    .category-card {
      background: white;
      border: 1px solid var(--border);
      border-top: 3px solid var(--clay);
      border-radius: 4px;
      padding: 1.4rem 1.3rem;
      text-decoration: none;
      color: inherit;
      border-bottom: none;
      transition: transform 0.18s, box-shadow 0.18s;
      display: block;
    }

    .category-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(28, 42, 59, 0.12);
      border-top-color: var(--clay-dark);
      border-bottom: none;
    }

    .category-card h3 {
      font-family: 'Playfair Display', serif;
      color: var(--navy);
      margin: 0 0 0.4rem;
      font-size: 1.05rem;
    }

    .category-card p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.45;
    }

    /* ── INLINE CODE ── */
    code {
      background: var(--sand);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.45em;
      font-size: 0.88em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--clay-dark);
    }

    /* ── BLOCKQUOTE ── */
    blockquote {
      border-left: 3px solid var(--clay);
      margin: 1.2rem 0;
      padding: 0.6rem 1.2rem;
      background: var(--clay-light);
      border-radius: 0 4px 4px 0;
      font-style: italic;
      color: var(--text-muted);
    }

    /* ── TABLE ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem;
      font-size: 0.93rem;
    }

    th {
      background: var(--navy);
      color: white;
      padding: 0.6rem 0.9rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    td {
      padding: 0.55rem 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    tr:hover td { background: var(--sand); }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.35);
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .header-inner { padding: 1.1rem 1.25rem; }
      .breadcrumb { padding: 0.6rem 1.25rem; }
      .container { padding: 2rem 1.25rem 3rem; }
      .category-grid { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 1.65rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <div class="site-title-icon">🎾</div>
        <div class="site-title-text">
          <span class="site-title-main">{{ site.title }}</span>
          <span class="site-title-sub">Knowledge Base</span>
        </div>
      </a>
    </div>
  </header>

  {% if page.url != '/' %}
  <div class="breadcrumb">
    <a href="{{ '/' | relative_url }}">← Oversigt</a>
    <span>/</span>
    <span style="color: var(--text-muted); font-size: 0.8rem;">{{ page.title }}</span>
  </div>
  {% endif %}

  <div class="container">
    {{ content }}
  </div>

  <footer>{{ site.title }} &mdash; Personlig knowledge base</footer>
</body>
</html>
